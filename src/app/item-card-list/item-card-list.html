<div class="items-list-container">
  <input
    type="text"
    placeholder="Пошук товару..."
    [(ngModel)]="searchTerm"
    (ngModelChange)="onSearchChange()"
    style="margin-bottom: 16px; padding: 8px; width: 100%; max-width: 400px; border-radius: 6px; border: 1px solid #ccc;" />
  <button routerLink="/items/add-item" class="add-btn">➕ Додати товар</button>


  <div class="items-list">
    <app-item-card
      *ngFor="let item of itemslist$ | async"
      [card_of_item]="item"
      (selectItem)="onItemSelected($event)">
    </app-item-card>
  </div>
</div>
